manifestVersion: 1
id: haven
category: social
name: Haven
version: "1.4.0"
tagline: High Availability Vault for Events on Nostr
description: >-
  Haven is a sovereign personal relay for the Nostr protocol, designed for storing
  and backing up sensitive notes like eCash, private chats, and drafts.


  Haven operates as four specialized relays in one application:

  - Private Relay: Restricted to the owner for drafts and sensitive content

  - Chat Relay: For direct messages with web-of-trust filtering

  - Inbox Relay: Aggregates notes where the owner is mentioned

  - Outbox Relay: Publicly accessible storage for owner's posts

  - Blossom Media Server: Hosts images and videos for sharing


  Features include intelligent filtering through web-of-trust protection, automatic
  note aggregation from other relays, cloud backup capabilities, and broadcast
  distribution to multiple relays simultaneously.
releaseNotes: >-
  Fresh installs now start unconfigured: the relay waits for you to complete
  the setup wizard instead of shipping with preconfigured ownership, and
  starts automatically once configured.


  Fixes and improvements:

  - The relay and Blossom media server get a dedicated Tor hidden service;
    the .onion address is shown in the configuration UI

  - Fixed Blossom media downloads failing when RELAY_URL included a ws:// or
    wss:// scheme; schemes are now stripped automatically on startup

  - The dashboard shows "Awaiting configuration" on fresh installs, and Full
    Configuration mode now includes an owner name field

  - Haven is now built from a pinned upstream commit (v1.2.2 plus the .onion
    relay URL fix) for reproducible builds, overridable via HAVEN_VERSION

  - Updated upstream project links to the new repository location
